name: Unity APK to Full Source Code with PC Controls
on:
  workflow_dispatch:

jobs:
  extract-unity-source:
    runs-on: windows-latest
    steps:
      - name: Download APK
        shell: pwsh
        run: |
          $url = "https://drive.usercontent.google.com/download?id=1BkFudhadd-Oz2nuJe8IOq6fSwSxSrTrM&confirm=t"
          Invoke-WebRequest -Uri $url -OutFile "cf1.1.3.apk"
          if (Test-Path "cf1.1.3.apk") {
            Write-Host "APK downloaded successfully"
          } else {
            Write-Host "Failed to download APK"
            exit 1
          }

      - name: Install 7zip
        shell: pwsh
        run: |
          choco install 7zip -y --force

      - name: Extract APK
        shell: pwsh
        run: |
          if (Test-Path "cf1.1.3.apk") {
            7z x cf1.1.3.apk -oAPK_Full -y
            Write-Host "APK extracted successfully"
          } else {
            Write-Host "APK file not found"
            exit 1
          }

      - name: Create Unity Project
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path UnityProject\Assets
          if (Test-Path "APK_Full") {
            Copy-Item -Path APK_Full\* -Destination UnityProject\Assets\ -Recurse -Force
            Write-Host "Files copied to Unity project"
          }

      - name: Create Unity Settings
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path UnityProject\ProjectSettings
          New-Item -ItemType Directory -Force -Path UnityProject\Packages
          "m_EditorVersion: 2021.3.0f1" | Out-File -FilePath UnityProject\ProjectSettings\ProjectVersion.txt

      - name: Create Manifest
        shell: pwsh
        run: |
          $manifest = '{"name":"com.counterflame.pc","version":"1.1.3","unity":"2021.3"}'
          $manifest | Out-File -FilePath UnityProject\Packages\manifest.json -Encoding UTF8

      - name: Create Scripts Folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path UnityProject\Assets\Scripts
          New-Item -ItemType Directory -Force -Path UnityProject\Assets\Scripts\PCControls

      - name: Create PCInputManager
        shell: pwsh
        run: |
          $content = @'
using UnityEngine;
public class PCInputManager : MonoBehaviour
{
    public static PCInputManager Instance;
    public Vector2 movementInput;
    public Vector2 lookInput;
    public bool shootPressed;
    public bool jumpPressed;
    public bool reloadPressed;
    public bool interactPressed;
    public bool crouchPressed;
    void Awake()
    {
        if (Instance == null) Instance = this;
        else Destroy(gameObject);
        DontDestroyOnLoad(gameObject);
    }
    void Update()
    {
        movementInput = new Vector2(Input.GetAxis("Horizontal"), Input.GetAxis("Vertical"));
        lookInput = new Vector2(Input.GetAxis("Mouse X"), Input.GetAxis("Mouse Y"));
        shootPressed = Input.GetMouseButtonDown(0);
        jumpPressed = Input.GetKeyDown(KeyCode.Space);
        reloadPressed = Input.GetKeyDown(KeyCode.R);
        interactPressed = Input.GetKeyDown(KeyCode.E);
        crouchPressed = Input.GetKey(KeyCode.LeftShift);
    }
}
'@
          $content | Out-File -FilePath "UnityProject\Assets\Scripts\PCControls\PCInputManager.cs" -Encoding UTF8

      - name: Create MouseLook
        shell: pwsh
        run: |
          $content = @'
using UnityEngine;
public class MouseLook : MonoBehaviour
{
    public float mouseSensitivity = 100f;
    public Transform playerBody;
    private float xRotation = 0f;
    void Start()
    {
        if (playerBody == null) playerBody = transform.parent;
        if (playerBody == null) playerBody = transform;
        Cursor.lockState = CursorLockMode.Locked;
    }
    void Update()
    {
        float mouseX = Input.GetAxis("Mouse X") * mouseSensitivity * Time.deltaTime;
        float mouseY = Input.GetAxis("Mouse Y") * mouseSensitivity * Time.deltaTime;
        xRotation -= mouseY;
        xRotation = Mathf.Clamp(xRotation, -90f, 90f);
        transform.localRotation = Quaternion.Euler(xRotation, 0f, 0f);
        playerBody.Rotate(Vector3.up * mouseX);
    }
}
'@
          $content | Out-File -FilePath "UnityProject\Assets\Scripts\PCControls\MouseLook.cs" -Encoding UTF8

      - name: Create PlayerMovement
        shell: pwsh
        run: |
          $content = @'
using UnityEngine;
public class PlayerMovement : MonoBehaviour
{
    public float walkSpeed = 5f;
    public float crouchSpeed = 2.5f;
    public float crouchHeight = 0.5f;
    private float originalHeight;
    private Rigidbody rb;
    void Start()
    {
        rb = GetComponent<Rigidbody>();
        if (rb == null) rb = gameObject.AddComponent<Rigidbody>();
        originalHeight = transform.localScale.y;
    }
    void Update()
    {
        float x = Input.GetAxis("Horizontal");
        float z = Input.GetAxis("Vertical");
        Vector3 move = transform.right * x + transform.forward * z;
        
        bool isCrouching = Input.GetKey(KeyCode.LeftShift);
        float currentSpeed = isCrouching ? crouchSpeed : walkSpeed;
        
        rb.velocity = new Vector3(move.x * currentSpeed, rb.velocity.y, move.z * currentSpeed);
        
        if (isCrouching)
        {
            transform.localScale = new Vector3(transform.localScale.x, crouchHeight, transform.localScale.z);
        }
        else
        {
            transform.localScale = new Vector3(transform.localScale.x, originalHeight, transform.localScale.z);
        }
    }
}
'@
          $content | Out-File -FilePath "UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs" -Encoding UTF8

      - name: Create CrouchController
        shell: pwsh
        run: |
          $content = @'
using UnityEngine;
public class CrouchController : MonoBehaviour
{
    private bool isCrouching = false;
    private float originalHeight;
    public float crouchHeight = 0.5f;
    public float crouchTransitionSpeed = 10f;
    private Camera playerCamera;
    void Start()
    {
        originalHeight = transform.localScale.y;
        playerCamera = GetComponentInChildren<Camera>();
    }
    void Update()
    {
        if (Input.GetKey(KeyCode.LeftShift))
        {
            isCrouching = true;
            Vector3 newScale = new Vector3(transform.localScale.x, crouchHeight, transform.localScale.z);
            transform.localScale = Vector3.Lerp(transform.localScale, newScale, Time.deltaTime * crouchTransitionSpeed);
            if (playerCamera != null)
            {
                Vector3 camPos = playerCamera.transform.localPosition;
                camPos.y = Mathf.Lerp(camPos.y, crouchHeight - 0.2f, Time.deltaTime * crouchTransitionSpeed);
                playerCamera.transform.localPosition = camPos;
            }
        }
        else
        {
            isCrouching = false;
            Vector3 newScale = new Vector3(transform.localScale.x, originalHeight, transform.localScale.z);
            transform.localScale = Vector3.Lerp(transform.localScale, newScale, Time.deltaTime * crouchTransitionSpeed);
            if (playerCamera != null)
            {
                Vector3 camPos = playerCamera.transform.localPosition;
                camPos.y = Mathf.Lerp(camPos.y, 0f, Time.deltaTime * crouchTransitionSpeed);
                playerCamera.transform.localPosition = camPos;
            }
        }
    }
}
'@
          $content | Out-File -FilePath "UnityProject\Assets\Scripts\PCControls\CrouchController.cs" -Encoding UTF8

      - name: Create Controls Help with Crouch
        shell: pwsh
        run: |
          $help = @'
PC CONTROLS:
- W/A/S/D : Move
- Mouse : Look around
- Left Click : Shoot
- Space : Jump
- Left Shift : Crouch / Присесть
- R : Reload
- E : Interact
- ESC : Pause
'@
          $help | Out-File -FilePath "UnityProject\Assets\Controls.txt" -Encoding UTF8

      - name: Create Batch File
        shell: pwsh
        run: |
          $batch = @'
@echo off
echo ======================================
echo CounterFlame PC Port
echo ======================================
echo.
echo Controls:
echo - WASD: Movement
echo - Mouse: Camera
echo - Left Click: Shoot
echo - Space: Jump
echo - Left Shift: Crouch
echo.
echo Open UnityProject folder in Unity Hub
echo.
pause
'@
          $batch | Out-File -FilePath "OpenInUnity.bat" -Encoding ASCII

      - name: Create Readme
        shell: pwsh
        run: |
          $readme = @'
CounterFlame PC Port
====================
PC Controls Added:

MOVEMENT:
- W/A/S/D : Walk
- Left Shift : Crouch / Присесть
- Space : Jump

COMBAT:
- Left Mouse Button : Shoot
- R : Reload
- E : Interact

CAMERA:
- Mouse : Look around

SYSTEM:
- ESC : Pause menu

How to build for PC:
1. Install Unity 2021.3
2. Open UnityProject folder in Unity Hub
3. File -> Build Settings -> Windows
4. Build and Run
'@
          $readme | Out-File -FilePath "UnityProject\README.txt" -Encoding UTF8

      - name: Create ZIP Archive
        shell: pwsh
        run: |
          7z a -tzip CounterFlame_PC_Port.zip UnityProject -r
          7z a -tzip CounterFlame_PC_Port.zip OpenInUnity.bat
          Write-Host "ZIP archive created"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CounterFlame_PC_Port
          path: |
            CounterFlame_PC_Port.zip
          compression-level: 0

      - name: Summary
        shell: pwsh
        run: |
          Write-Host "========================================"
          Write-Host "CounterFlame PC Port Complete!"
          Write-Host "========================================"
          Write-Host "PC Controls Added:"
          Write-Host "- WASD: Movement"
          Write-Host "- Mouse: Camera"
          Write-Host "- Left Shift: Crouch (Присесть)"
          Write-Host "- Space: Jump"
          Write-Host "========================================"
