name: Unity APK to Full Source Code
on:
  workflow_dispatch:

jobs:
  extract-unity-source:
    runs-on: windows-latest
    steps:
      - name: Download APK
        shell: pwsh
        run: |
          $url = "https://drive.usercontent.google.com/download?id=1BkFudhadd-Oz2nuJe8IOq6fSwSxSrTrM&confirm=t"
          Invoke-WebRequest -Uri $url -OutFile "game.apk"
          Write-Host "Downloaded: game.apk"

      - name: Install Everything
        run: |
          # Базовые инструменты
          choco install 7zip -y
          choco install python -y
          
          # Устанавливаем Python пакеты для распаковки Unity ассетов
          python -m pip install UnityPy
          python -m pip install assetstudio
          
          # Скачиваем утилиты
          mkdir Tools
          cd Tools
          
          # AssetStudioGUI
          curl -L -o assetstudio.zip https://github.com/Perfare/AssetStudio/releases/download/v0.16.47/AssetStudio.net48.v0.16.47.zip
          7z x assetstudio.zip -oAssetStudio
          
          # uTinyRipper
          curl -L -o utinyripper.zip https://github.com/mafaca/UtinyRipper/releases/download/2.0.0.2/uTinyRipper_2.0.0.2.zip
          7z x utinyripper.zip -ouTinyRipper
          
          # Il2CppDumper для скриптов
          curl -L -o il2cppdumper.zip https://github.com/Perfare/Il2CppDumper/releases/download/v6.7.40/Il2CppDumper-v6.7.40.zip
          7z x il2cppdumper.zip -oIl2CppDumper
          
          cd ..

      - name: Extract APK Structure
        run: |
          # Полная распаковка APK
          7z x game.apk -o./APK_Full -y
          Write-Host "APK fully extracted to APK_Full"

      - name: Find Unity Files
        shell: pwsh
        run: |
          # Ищем все Unity ассеты
          $unityFiles = Get-ChildItem -Path ./APK_Full -Recurse -Include *.assets, *.sharedAssets, *.resource, *.unity3d, *.bundle
          Write-Host "Found $($unityFiles.Count) Unity asset files"
          
          # Копируем их в отдельную папку
          New-Item -ItemType Directory -Force -Path ./UnityAssets
          foreach ($file in $unityFiles) {
            Copy-Item -Path $file.FullName -Destination ./UnityAssets/ -Force
          }

      - name: Extract Unity Assets with Python
        shell: pwsh
        run: |
          python -c @"
          import UnityPy
          import os
          from pathlib import Path
          
          output_dir = './ExtractedAssets'
          os.makedirs(output_dir, exist_ok=True)
          
          # Ищем все asset файлы
          asset_files = list(Path('./APK_Full').rglob('*.assets')) + \
                        list(Path('./APK_Full').rglob('*.sharedAssets')) + \
                        list(Path('./APK_Full').rglob('*.unity3d'))
          
          for asset_file in asset_files:
              try:
                  env = UnityPy.load(asset_file)
                  
                  for obj in env.objects:
                      try:
                          data = obj.read()
                          
                          # Сохраняем текстуры
                          if data.type.name == 'Texture2D':
                              img = data.image
                              if img:
                                  img.save(f'{output_dir}/Texture_{obj.path_id}.png')
                          
                          # Сохраняем шейдеры
                          elif data.type.name == 'Shader':
                              with open(f'{output_dir}/Shader_{obj.path_id}.txt', 'w') as f:
                                  f.write(str(data.script))
                          
                          # Сохраняем меши
                          elif data.type.name == 'Mesh':
                              with open(f'{output_dir}/Mesh_{obj.path_id}.obj', 'w') as f:
                                  f.write(data.export())
                          
                          # Сохраняем анимации
                          elif data.type.name == 'AnimationClip':
                              with open(f'{output_dir}/Animation_{obj.path_id}.txt', 'w') as f:
                                  f.write(str(data))
                          
                          # Сохраняем MonoBehaviour скрипты
                          elif data.type.name == 'MonoBehaviour':
                              script_name = getattr(data, 'm_Name', f'Script_{obj.path_id}')
                              with open(f'{output_dir}/{script_name}.json', 'w') as f:
                                  import json
                                  json.dump(data.__dict__, f, indent=2, default=str)
                                  
                      except Exception as e:
                          pass
                          
              except Exception as e:
                  print(f'Error processing {asset_file}: {e}')
          "@

      - name: Extract Il2CPP Code to C#
        shell: pwsh
        run: |
          # Ищем глобальный метадата
          $metaData = Get-ChildItem -Path ./APK_Full -Recurse -Filter "global-metadata.dat" | Select-Object -First 1
          $il2CppLib = Get-ChildItem -Path ./APK_Full -Recurse -Filter "libil2cpp.so" | Select-Object -First 1
          
          if ($metaData -and $il2CppLib) {
            Write-Host "Found Il2CPP, dumping to C#..."
            
            # Запускаем Il2CppDumper
            $config = '{"DumpMethod":1,"DumpField":1,"GenerateDummyDll":1,"GenerateDummyDllDummyDll":1}'
            $config | Out-File -FilePath "./Tools/Il2CppDumper/config.json" -Encoding UTF8
            
            & "./Tools/Il2CppDumper/Il2CppDumper.exe" $il2CppLib.FullName $metaData.FullName "./DumpedScripts"
            
            Write-Host "C# scripts dumped to DumpedScripts"
          }

      - name: Extract All Resources
        shell: pwsh
        run: |
          # Копируем всё: текстуры, звуки, видео, конфиги
          $foldersToCopy = @('assets', 'res', 'lib', 'original')
          
          New-Item -ItemType Directory -Force -Path ./UnityProject/Assets
          
          foreach ($folder in $foldersToCopy) {
            $source = "./APK_Full/$folder"
            if (Test-Path $source) {
              Copy-Item -Path $source -Destination ./UnityProject/Assets/ -Recurse -Force
            }
          }
          
          # Конвертируем все возможные файлы
          Get-ChildItem -Path ./APK_Full -Recurse | ForEach-Object {
            $ext = $_.Extension.ToLower()
            $dest = "./UnityProject/Assets/" + $_.FullName.Replace("./APK_Full/", "")
            
            # Создаем папку назначения
            $destDir = Split-Path $dest -Parent
            if (!(Test-Path $destDir)) { New-Item -ItemType Directory -Force -Path $destDir }
            
            # Копируем файл
            Copy-Item -Path $_.FullName -Destination $dest -Force
          }

      - name: Create Unity Project Structure
        shell: pwsh
        run: |
          # Создаем полную структуру Unity проекта
          New-Item -ItemType Directory -Force -Path ./UnityProject/Assets
          New-Item -ItemType Directory -Force -Path ./UnityProject/Assets/Scenes
          New-Item -ItemType Directory -Force -Path ./UnityProject/Assets/Scripts
          New-Item -ItemType Directory -Force -Path ./UnityProject/Assets/Plugins
          New-Item -ItemType Directory -Force -Path ./UnityProject/Assets/Resources
          New-Item -ItemType Directory -Force -Path ./UnityProject/Assets/StreamingAssets
          New-Item -ItemType Directory -Force -Path ./UnityProject/ProjectSettings
          New-Item -ItemType Directory -Force -Path ./UnityProject/Packages
          
          # Копируем извлеченные скрипты
          if (Test-Path "./DumpedScripts") {
            Copy-Item -Path "./DumpedScripts/*.cs" -Destination ./UnityProject/Assets/Scripts/ -Force
          }
          
          # Переносим извлеченные ассеты
          if (Test-Path "./ExtractedAssets") {
            Copy-Item -Path "./ExtractedAssets/*" -Destination ./UnityProject/Assets/ -Recurse -Force
          }
          
          # Создаем манифест пакета
          @'
          {
            "name": "com.counterflame.extracted",
            "version": "1.1.3",
            "displayName": "CounterFlame (Extracted)",
            "description": "Extracted Unity project from APK",
            "unity": "2021.3",
            "dependencies": {}
          }
'@ | Out-File -FilePath "./UnityProject/Packages/manifest.json" -Encoding UTF8
          
          # Создаем настройки проекта
          @'
          --- !u!129 &1
          PlayerSettings:
            productName: CounterFlame
            companyName: ExtractedGame
          '@ | Out-File -FilePath "./UnityProject/ProjectSettings/ProjectSettings.asset" -Encoding UTF8

      - name: Create Batch Build Script
        shell: pwsh
        run: |
          # Создаем .bat файл для открытия в Unity
          @'
          @echo off
          echo ============================================
          echo CounterFlame Extracted Unity Project
          echo ============================================
          echo.
          echo To open this project:
          echo 1. Open Unity Hub
          echo 2. Click "Add" and select the "UnityProject" folder
          echo 3. Open the project (Unity version 2021.3 or later)
          echo.
          echo Extracted contents:
          echo - Scripts (C#)
          echo - Textures 
          echo - Meshes
          echo - Animations
          echo - Audio files
          echo - Shaders
          echo.
          echo Note: Some scripts may need manual fixes
          echo.
          pause
          '@ | Out-File -FilePath "./OpenInUnity.bat" -Encoding ASCII
          
          # Создаем README
          @"
          # CounterFlame Extracted Unity Project
          
          ## Что извлечено:
          - Все файлы из APK
          - C# скрипты (если игра на IL2CPP)
          - Все текстуры (PNG, DDS)
          - 3D модели (OBJ, FBX)
          - Анимации
          - Звуки/музыка
          - Шейдеры
          - Настройки
          
          ## Как открыть:
          1. Установите Unity 2021.3 или новее
          2. Откройте Unity Hub
          3. Добавьте папку 'UnityProject'
          4. Откройте проект
          
          ## Папки:
          - Assets/ - все игровые ресурсы
          - Assets/Scripts/ - извлеченные скрипты
          - Assets/Plugins/ - нативные библиотеки
          - ProjectSettings/ - настройки проекта
          
          ## Важно:
          - Некоторые скрипты могут требовать исправлений
          - Зависимости от Android плагинов будут удалены
          - Возможна потеря некоторых ссылок
          "@ | Out-File -FilePath "./UnityProject/README.txt" -Encoding UTF8

      - name: Pack Everything
        run: |
          # Упаковываем в один архив
          7z a -tzip CounterFlame_Unity_Source.zip ./UnityProject -r
          7z a -tzip CounterFlame_Unity_Source.zip ./OpenInUnity.bat
          
          # Создаем EXE самораспаковывающийся архив
          7z a -sfx CounterFlame_Source_Installer.exe ./UnityProject -r

      - name: Upload Final
        uses: actions/upload-artifact@v4
        with:
          name: CounterFlame_Unity_Full_Source
          path: |
            CounterFlame_Unity_Source.zip
            CounterFlame_Source_Installer.exe
            OpenInUnity.bat
            ./UnityProject
          compression-level: 0

      - name: Prepare Upload Summary
        shell: pwsh
        run: |
          $totalFiles = (Get-ChildItem -Path ./UnityProject -Recurse -File).Count
          $totalSize = [math]::Round((Get-ChildItem -Path ./UnityProject -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 2)
          
          Write-Host "::notice::Extraction Complete! Total files: $totalFiles, Total size: ${totalSize}MB"
          
          @"
          # ✅ Extraction Complete
          
          **Files extracted:** $totalFiles
          **Total size:** ${totalSize}MB
          
          ## 📦 Download artifacts above
          
          ## 📁 Project structure ready for Unity
          "@ > $env:GITHUB_STEP_SUMMARY
