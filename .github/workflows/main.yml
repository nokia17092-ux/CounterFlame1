name: Unity APK to Full Source Code with PC Controls
on:
  workflow_dispatch:

jobs:
  extract-unity-source:
    runs-on: windows-latest
    steps:
      - name: Download APK
        shell: pwsh
        run: |
          $url = "https://drive.usercontent.google.com/download?id=1BkFudhadd-Oz2nuJe8IOq6fSwSxSrTrM&confirm=t"
          Invoke-WebRequest -Uri $url -OutFile "cf1.1.3.apk"
          if (Test-Path "cf1.1.3.apk") {
            Write-Host "APK downloaded successfully"
          } else {
            Write-Host "Failed to download APK"
            exit 1
          }

      - name: Install 7zip
        shell: pwsh
        run: |
          choco install 7zip -y --force

      - name: Extract APK
        shell: pwsh
        run: |
          if (Test-Path "cf1.1.3.apk") {
            7z x cf1.1.3.apk -oAPK_Full -y
            Write-Host "APK extracted successfully"
          } else {
            Write-Host "APK file not found"
            exit 1
          }

      - name: Create Unity Project
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path UnityProject\Assets
          if (Test-Path "APK_Full") {
            Copy-Item -Path APK_Full\* -Destination UnityProject\Assets\ -Recurse -Force
            Write-Host "Files copied to Unity project"
          } else {
            Write-Host "APK_Full folder not found"
          }

      - name: Create Unity Settings
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path UnityProject\ProjectSettings
          New-Item -ItemType Directory -Force -Path UnityProject\Packages
          "m_EditorVersion: 2021.3.0f1" | Out-File -FilePath UnityProject\ProjectSettings\ProjectVersion.txt
          Write-Host "Unity settings created"

      - name: Create Manifest
        shell: pwsh
        run: |
          $manifest = @'
{
  "name": "com.counterflame.pc",
  "version": "1.1.3",
  "unity": "2021.3"
}
'@
          $manifest | Out-File -FilePath UnityProject\Packages\manifest.json -Encoding UTF8

      - name: Create Scripts Folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path UnityProject\Assets\Scripts
          New-Item -ItemType Directory -Force -Path UnityProject\Assets\Scripts\PCControls
          Write-Host "Scripts folder created"

      - name: Create PC Control Scripts
        shell: pwsh
        run: |
          $scripts = @{
            "PCInputManager.cs" = @'
using UnityEngine;
public class PCInputManager : MonoBehaviour
{
    public static PCInputManager Instance;
    public Vector2 movementInput;
    public Vector2 lookInput;
    public bool shootPressed;
    public bool jumpPressed;
    public bool reloadPressed;
    public bool interactPressed;
    void Awake()
    {
        if (Instance == null) Instance = this;
        else Destroy(gameObject);
        DontDestroyOnLoad(gameObject);
    }
    void Update()
    {
        movementInput = new Vector2(Input.GetAxis("Horizontal"), Input.GetAxis("Vertical"));
        lookInput = new Vector2(Input.GetAxis("Mouse X"), Input.GetAxis("Mouse Y"));
        shootPressed = Input.GetMouseButtonDown(0);
        jumpPressed = Input.GetKeyDown(KeyCode.Space);
        reloadPressed = Input.GetKeyDown(KeyCode.R);
        interactPressed = Input.GetKeyDown(KeyCode.E);
    }
}
'@
            "MouseLook.cs" = @'
using UnityEngine;
public class MouseLook : MonoBehaviour
{
    public float mouseSensitivity = 100f;
    public Transform playerBody;
    private float xRotation = 0f;
    void Start()
    {
        if (playerBody == null) playerBody = transform.parent;
        if (playerBody == null) playerBody = transform;
        Cursor.lockState = CursorLockMode.Locked;
    }
    void Update()
    {
        float mouseX = Input.GetAxis("Mouse X") * mouseSensitivity * Time.deltaTime;
        float mouseY = Input.GetAxis("Mouse Y") * mouseSensitivity * Time.deltaTime;
        xRotation -= mouseY;
        xRotation = Mathf.Clamp(xRotation, -90f, 90f);
        transform.localRotation = Quaternion.Euler(xRotation, 0f, 0f);
        playerBody.Rotate(Vector3.up * mouseX);
    }
}
'@
            "PlayerMovement.cs" = @'
using UnityEngine;
public class PlayerMovement : MonoBehaviour
{
    public float speed = 5f;
    private Rigidbody rb;
    void Start()
    {
        rb = GetComponent<Rigidbody>();
        if (rb == null) rb = gameObject.AddComponent<Rigidbody>();
    }
    void Update()
    {
        float x = Input.GetAxis("Horizontal");
        float z = Input.GetAxis("Vertical");
        Vector3 move = transform.right * x + transform.forward * z;
        rb.velocity = new Vector3(move.x * speed, rb.velocity.y, move.z * speed);
    }
}
'@
          }
          
          foreach ($script in $scripts.Keys) {
            $path = "UnityProject\Assets\Scripts\PCControls\$script"
            $content = $scripts[$script]
            $content | Out-File -FilePath $path -Encoding UTF8
            Write-Host "Created: $script"
          }

      - name: Create Controls Help
        shell: pwsh
        run: |
          $help = @'
PC CONTROLS:
- W/A/S/D : Move
- Mouse : Look around  
- Left Click : Shoot
- Space : Jump
- R : Reload
- E : Interact
- ESC : Pause
'@
          $help | Out-File -FilePath "UnityProject\Assets\Controls.txt" -Encoding UTF8

      - name: Create Batch File
        shell: pwsh
        run: |
          $batch = @'
@echo off
echo ======================================
echo CounterFlame PC Port
echo ======================================
echo.
echo Controls:
echo - WASD: Movement
echo - Mouse: Camera
echo - Left Click: Shoot
echo - Space: Jump
echo.
echo Open UnityProject folder in Unity Hub
echo.
pause
'@
          $batch | Out-File -FilePath "OpenInUnity.bat" -Encoding ASCII

      - name: Create Readme
        shell: pwsh
        run: |
          $readme = @'
CounterFlame PC Port
====================
This is an extracted Unity project with PC controls added.

How to use:
1. Install Unity 2021.3 or newer
2. Open Unity Hub
3. Add and open the UnityProject folder
4. Build for Windows (File -> Build Settings -> Windows)

PC Controls Added:
- Movement: WASD
- Camera: Mouse
- Shoot: Left Click
- Jump: Space
- Reload: R
- Interact: E
- Pause: ESC
'@
          $readme | Out-File -FilePath "UnityProject\README.txt" -Encoding UTF8

      - name: Create ZIP Archive
        shell: pwsh
        run: |
          7z a -tzip CounterFlame_PC_Port.zip UnityProject -r
          7z a -tzip CounterFlame_PC_Port.zip OpenInUnity.bat
          Write-Host "ZIP archive created"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CounterFlame_PC_Port
          path: |
            CounterFlame_PC_Port.zip
          compression-level: 0

      - name: Summary
        shell: pwsh
        run: |
          Write-Host "========================================"
          Write-Host "CounterFlame PC Port Complete!"
          Write-Host "========================================"
          Write-Host "Files extracted and PC controls added"
          Write-Host "Download CounterFlame_PC_Port.zip"
          Write-Host "========================================"
