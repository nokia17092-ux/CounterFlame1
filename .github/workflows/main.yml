name: Unity APK to Full Source Code with PC Controls
on:
  workflow_dispatch:

jobs:
  extract-unity-source:
    runs-on: windows-latest
    steps:
      - name: Download APK
        run: |
          curl -L -o cf1.1.3.apk "https://drive.usercontent.google.com/download?id=1BkFudhadd-Oz2nuJe8IOq6fSwSxSrTrM&confirm=t"

      - name: Install 7zip
        run: |
          choco install 7zip -y

      - name: Extract APK
        run: |
          7z x cf1.1.3.apk -oAPK_Full -y

      - name: Create Unity Project
        run: |
          mkdir UnityProject\Assets
          xcopy APK_Full UnityProject\Assets /E /I /Y

      - name: Create Unity Settings
        run: |
          mkdir UnityProject\ProjectSettings
          mkdir UnityProject\Packages
          echo m_EditorVersion: 2021.3.0f1 > UnityProject\ProjectSettings\ProjectVersion.txt

      - name: Create Manifest
        run: |
          echo { > UnityProject\Packages\manifest.json
          echo   "name": "com.counterflame.pc", >> UnityProject\Packages\manifest.json
          echo   "version": "1.1.3", >> UnityProject\Packages\manifest.json
          echo   "unity": "2021.3" >> UnityProject\Packages\manifest.json
          echo } >> UnityProject\Packages\manifest.json

      - name: Extract DLLs
        run: |
          mkdir UnityProject\Assets\Scripts
          mkdir UnityProject\Assets\Plugins
          mkdir UnityProject\Assets\Scripts\PCControls
          for /r APK_Full %i in (Assembly-CSharp*.dll) do copy "%i" UnityProject\Assets\Scripts\ 2>nul

      - name: Create PC Control System
        run: |
          echo using UnityEngine; > UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo using System.Collections.Generic; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo public class PCInputManager : MonoBehaviour >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo { >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     public static PCInputManager Instance; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     public Vector2 movementInput; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     public Vector2 lookInput; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     public bool jumpPressed; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     public bool shootPressed; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     public bool reloadPressed; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     public bool interactPressed; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     public bool pausePressed; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     private void Awake() >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         if (Instance == null) Instance = this; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         else Destroy(gameObject); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         DontDestroyOnLoad(gameObject); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     private void Update() >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         movementInput = new Vector2(Input.GetAxis("Horizontal"), Input.GetAxis("Vertical")); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         lookInput = new Vector2(Input.GetAxis("Mouse X"), Input.GetAxis("Mouse Y")); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         jumpPressed = Input.GetKeyDown(KeyCode.Space); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         shootPressed = Input.GetMouseButtonDown(0); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         reloadPressed = Input.GetKeyDown(KeyCode.R); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         interactPressed = Input.GetKeyDown(KeyCode.E); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         pausePressed = Input.GetKeyDown(KeyCode.Escape); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo } >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs

      - name: Create Mouse Look Script
        run: |
          echo using UnityEngine; > UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo public class MouseLook : MonoBehaviour >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo { >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     public float mouseSensitivity = 100f; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     public Transform playerBody; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     private float xRotation = 0f; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     void Start() >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         if (playerBody == null) >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo             playerBody = transform.parent; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         if (playerBody == null) >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo             playerBody = transform; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         Cursor.lockState = CursorLockMode.Locked; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     void Update() >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         float mouseX = Input.GetAxis("Mouse X") * mouseSensitivity * Time.deltaTime; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         float mouseY = Input.GetAxis("Mouse Y") * mouseSensitivity * Time.deltaTime; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         xRotation -= mouseY; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         xRotation = Mathf.Clamp(xRotation, -90f, 90f); >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         transform.localRotation = Quaternion.Euler(xRotation, 0f, 0f); >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         playerBody.Rotate(Vector3.up * mouseX); >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo } >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs

      - name: Create WASD Movement Script
        run: |
          echo using UnityEngine; > UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo public class PlayerMovement : MonoBehaviour >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo { >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     public float speed = 5f; >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     private Rigidbody rb; >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     void Start() >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         rb = GetComponent^<Rigidbody^>(); >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         if (rb == null) rb = gameObject.AddComponent^<Rigidbody^>(); >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     void Update() >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         float x = Input.GetAxis("Horizontal"); >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         float z = Input.GetAxis("Vertical"); >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         Vector3 move = transform.right * x + transform.forward * z; >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         rb.velocity = new Vector3(move.x * speed, rb.velocity.y, move.z * speed); >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo } >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs

      - name: Create Input Wrapper
        run: |
          echo using UnityEngine; > UnityProject\Assets\Scripts\PCControls\InputWrapper.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\InputWrapper.cs
          echo public static class InputWrapper >> UnityProject\Assets\Scripts\PCControls\InputWrapper.cs
          echo { >> UnityProject\Assets\Scripts\PCControls\InputWrapper.cs
          echo     public static Vector2 GetMovementInput() >> UnityProject\Assets\Scripts\PCControls\InputWrapper.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\InputWrapper.cs
          echo         return PCInputManager.Instance != null ? PCInputManager.Instance.movementInput : Vector2.zero; >> UnityProject\Assets\Scripts\PCControls\InputWrapper.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\InputWrapper.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\InputWrapper.cs
          echo     public static bool GetShootInput() >> UnityProject\Assets\Scripts\PCControls\InputWrapper.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\InputWrapper.cs
          echo         return PCInputManager.Instance != null && PCInputManager.Instance.shootPressed; >> UnityProject\Assets\Scripts\PCControls\InputWrapper.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\InputWrapper.cs
          echo } >> UnityProject\Assets\Scripts\PCControls\InputWrapper.cs

      - name: Create Control Remapper
        run: |
          echo using UnityEngine; > UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo using UnityEngine.UI; >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo using System.Collections.Generic; >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo public class ControlRemapper : MonoBehaviour >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo { >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo     public static ControlRemapper Instance; >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo     private Dictionary^<string, KeyCode^> keyBindings = new Dictionary^<string, KeyCode^>(); >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo     void Awake() >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo         if (Instance == null) Instance = this; >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo         LoadBindings(); >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo     void LoadBindings() >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo         keyBindings["Jump"] = KeyCode.Space; >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo         keyBindings["Reload"] = KeyCode.R; >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo         keyBindings["Interact"] = KeyCode.E; >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo         keyBindings["Pause"] = KeyCode.Escape; >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs
          echo } >> UnityProject\Assets\Scripts\PCControls\ControlRemapper.cs

      - name: Create PC Settings
        run: |
          echo using UnityEngine; > UnityProject\Assets\Scripts\PCControls\PCSettings.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\PCSettings.cs
          echo public class PCSettings : MonoBehaviour >> UnityProject\Assets\Scripts\PCControls\PCSettings.cs
          echo { >> UnityProject\Assets\Scripts\PCControls\PCSettings.cs
          echo     public static float mouseSensitivity = 100f; >> UnityProject\Assets\Scripts\PCControls\PCSettings.cs
          echo     public static bool invertMouse = false; >> UnityProject\Assets\Scripts\PCControls\PCSettings.cs
          echo     public static int resolutionWidth = 1920; >> UnityProject\Assets\Scripts\PCControls\PCSettings.cs
          echo     public static int resolutionHeight = 1080; >> UnityProject\Assets\Scripts\PCControls\PCSettings.cs
          echo     public static bool fullscreen = true; >> UnityProject\Assets\Scripts\PCControls\PCSettings.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\PCSettings.cs
          echo     void Start() >> UnityProject\Assets\Scripts\PCControls\PCSettings.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\PCSettings.cs
          echo         Screen.SetResolution(resolutionWidth, resolutionHeight, fullscreen); >> UnityProject\Assets\Scripts\PCControls\PCSettings.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\PCSettings.cs
          echo } >> UnityProject\Assets\Scripts\PCControls\PCSettings.cs

      - name: Create Controls UI
        run: |
          echo using UnityEngine; > UnityProject\Assets\Scripts\PCControls\ControlsUI.cs
          echo using UnityEngine.UI; >> UnityProject\Assets\Scripts\PCControls\ControlsUI.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\ControlsUI.cs
          echo public class ControlsUI : MonoBehaviour >> UnityProject\Assets\Scripts\PCControls\ControlsUI.cs
          echo { >> UnityProject\Assets\Scripts\PCControls\ControlsUI.cs
          echo     public GameObject controlsPanel; >> UnityProject\Assets\Scripts\PCControls\ControlsUI.cs
          echo. >> UnityProject\Assets\Scripts\PCControls\ControlsUI.cs
          echo     void Update() >> UnityProject\Assets\Scripts\PCControls\ControlsUI.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\ControlsUI.cs
          echo         if (Input.GetKeyDown(KeyCode.F1)) >> UnityProject\Assets\Scripts\PCControls\ControlsUI.cs
          echo         { >> UnityProject\Assets\Scripts\PCControls\ControlsUI.cs
          echo             controlsPanel.SetActive(!controlsPanel.activeSelf); >> UnityProject\Assets\Scripts\PCControls\ControlsUI.cs
          echo         } >> UnityProject\Assets\Scripts\PCControls\ControlsUI.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\ControlsUI.cs
          echo } >> UnityProject\Assets\Scripts\PCControls\ControlsUI.cs

      - name: Create Control Help Text
        run: |
          echo Controls: > UnityProject\Assets\Controls_Help.txt
          echo ======== >> UnityProject\Assets\Controls_Help.txt
          echo W/A/S/D - Move >> UnityProject\Assets\Controls_Help.txt
          echo Mouse - Look around >> UnityProject\Assets\Controls_Help.txt
          echo Left Click - Shoot >> UnityProject\Assets\Controls_Help.txt
          echo Space - Jump >> UnityProject\Assets\Controls_Help.txt
          echo R - Reload >> UnityProject\Assets\Controls_Help.txt
          echo E - Interact >> UnityProject\Assets\Controls_Help.txt
          echo ESC - Pause >> UnityProject\Assets\Controls_Help.txt
          echo F1 - Show/Hide Controls >> UnityProject\Assets\Controls_Help.txt

      - name: Create Batch File
        run: |
          echo @echo off > OpenInUnity.bat
          echo echo ======================================== >> OpenInUnity.bat
          echo echo CounterFlame PC Control System Added >> OpenInUnity.bat
          echo echo ======================================== >> OpenInUnity.bat
          echo echo. >> OpenInUnity.bat
          echo echo Controls added: >> OpenInUnity.bat
          echo echo - WASD Movement >> OpenInUnity.bat
          echo echo - Mouse Look >> OpenInUnity.bat
          echo echo - Left Click Shoot >> OpenInUnity.bat
          echo echo - Space Jump >> OpenInUnity.bat
          echo echo - R Reload >> OpenInUnity.bat
          echo echo - E Interact >> OpenInUnity.bat
          echo echo. >> OpenInUnity.bat
          echo echo Open UnityProject folder in Unity Hub >> OpenInUnity.bat
          echo pause >> OpenInUnity.bat

      - name: Create Readme
        run: |
          echo CounterFlame PC Port > UnityProject\README.txt
          echo ================= >> UnityProject\README.txt
          echo. >> UnityProject\README.txt
          echo PC Controls Added: >> UnityProject\README.txt
          echo - WASD: Movement >> UnityProject\README.txt
          echo - Mouse: Camera look >> UnityProject\README.txt
          echo - Left Click: Shoot >> UnityProject\README.txt
          echo - Space: Jump >> UnityProject\README.txt
          echo - R: Reload >> UnityProject\README.txt
          echo - E: Interact >> UnityProject\README.txt
          echo - ESC: Pause menu >> UnityProject\README.txt
          echo - F1: Show controls >> UnityProject\README.txt
          echo. >> UnityProject\README.txt
          echo To build for PC: >> UnityProject\README.txt
          echo 1. Open in Unity >> UnityProject\README.txt
          echo 2. File -> Build Settings >> UnityProject\README.txt
          echo 3. Switch to Windows >> UnityProject\README.txt
          echo 4. Build and run >> UnityProject\README.txt

      - name: Create ZIP
        run: |
          7z a -tzip CounterFlame_PC_Port.zip UnityProject -r
          7z a -tzip CounterFlame_PC_Port.zip OpenInUnity.bat

      - name: Create EXE Installer
        run: |
          7z a -sfx CounterFlame_PC_Installer.exe UnityProject OpenInUnity.bat -r

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CounterFlame_PC_Port
          path: |
            CounterFlame_PC_Port.zip
            CounterFlame_PC_Installer.exe
          compression-level: 0

      - name: Complete
        shell: cmd
        run: |
          echo ========================================
          echo CounterFlame PC Port Complete!
          echo ========================================
          echo PC Controls Successfully Added!
          echo - WASD + Mouse controls
          echo - Full input system
          echo - Control remapping ready
          echo ========================================
