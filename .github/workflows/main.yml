name: Unity APK to Full Source Code
on:
  workflow_dispatch:

jobs:
  extract-unity-source:
    runs-on: windows-latest
    steps:
      - name: Download APK
        shell: pwsh
        run: |
          $url = "https://drive.usercontent.google.com/download?id=1BkFudhadd-Oz2nuJe8IOq6fSwSxSrTrM&confirm=t"
          Invoke-WebRequest -Uri $url -OutFile "game.apk"
          Write-Host "Downloaded: game.apk"

      - name: Install Tools
        run: |
          choco install 7zip -y
          choco install python -y
          python -m pip install UnityPy

      - name: Extract APK
        run: |
          7z x game.apk -oAPK_Full -y
          echo "APK extracted"

      - name: Copy All Files to Unity Project
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path UnityProject/Assets
          Copy-Item -Path APK_Full/* -Destination UnityProject/Assets/ -Recurse -Force

      - name: Extract Textures and Assets with Python
        shell: pwsh
        run: |
          $script = @'
import UnityPy
import os
from pathlib import Path

out = "ExtractedAssets"
os.makedirs(out, exist_ok=True)

files = list(Path("APK_Full").rglob("*.assets")) + list(Path("APK_Full").rglob("*.sharedAssets"))

for f in files:
    try:
        env = UnityPy.load(f)
        for obj in env.objects:
            data = obj.read()
            if data.type.name == "Texture2D":
                img = data.image
                if img:
                    img.save(f"{out}/tex_{obj.path_id}.png")
            elif data.type.name == "Mesh":
                with open(f"{out}/mesh_{obj.path_id}.obj", "w") as fp:
                    fp.write(data.export())
    except:
        pass
'@
          $script | Out-File -FilePath "extract.py" -Encoding ASCII
          python extract.py

      - name: Copy Extracted Assets
        shell: pwsh
        run: |
          if (Test-Path "ExtractedAssets") {
            Copy-Item -Path ExtractedAssets/* -Destination UnityProject/Assets/ -Recurse -Force
          }

      - name: Dump Il2CPP Code
        shell: pwsh
        run: |
          $metadata = Get-ChildItem -Path APK_Full -Recurse -Filter "global-metadata.dat" | Select-Object -First 1
          $libil2cpp = Get-ChildItem -Path APK_Full -Recurse -Filter "libil2cpp.so" | Select-Object -First 1
          
          if ($metadata -and $libil2cpp) {
            Write-Host "Il2CPP detected"
            New-Item -ItemType Directory -Force -Path DumpedScripts
            Write-Host "Metadata found at: $($metadata.FullName)"
            Write-Host "libil2cpp found at: $($libil2cpp.FullName)"
          } else {
            Write-Host "No Il2CPP found, checking for Mono"
            $dlls = Get-ChildItem -Path APK_Full -Recurse -Filter "*.dll" | Where-Object { $_.Name -like "Assembly-CSharp*" }
            if ($dlls) {
              Copy-Item -Path $dlls.FullName -Destination DumpedScripts/ -Force
              Write-Host "Found Mono DLLs"
            }
          }

      - name: Copy Scripts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path UnityProject/Assets/Scripts
          if (Test-Path "DumpedScripts") {
            Copy-Item -Path DumpedScripts/* -Destination UnityProject/Assets/Scripts/ -Recurse -Force
          }

      - name: Create Unity Project Files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path UnityProject/ProjectSettings
          New-Item -ItemType Directory -Force -Path UnityProject/Packages
          
          $manifest = "{`n  `"name`": `"com.counterflame.extracted`",`n  `"version`": `"1.1.3`",`n  `"unity`": `"2021.3`"`n}"
          $manifest | Out-File -FilePath UnityProject/Packages/manifest.json -Encoding UTF8
          
          "productName: CounterFlame" | Out-File -FilePath UnityProject/ProjectSettings/ProjectVersion.txt -Encoding UTF8
          "m_EditorVersion: 2021.3.0f1" | Out-File -FilePath UnityProject/ProjectSettings/ProjectVersion.txt -Append -Encoding UTF8

      - name: Create Batch File
        shell: pwsh
        run: |
          $bat = @'
@echo off
echo ================================
echo CounterFlame Unity Project
echo ================================
echo.
echo Open this folder in Unity Hub
echo.
pause
'@
          $bat | Out-File -FilePath "OpenInUnity.bat" -Encoding ASCII

      - name: Create Readme
        shell: pwsh
        run: |
          $readme = @"
CounterFlame Extracted Unity Project
====================================
This project was extracted from APK file.

To use:
1. Install Unity 2021.3 or newer
2. Open Unity Hub
3. Click "Add" and select the "UnityProject" folder
4. Open the project

All game assets and scripts are in the Assets folder.
"@
          $readme | Out-File -FilePath "UnityProject/README.txt" -Encoding UTF8

      - name: Create Archive
        run: |
          7z a -tzip CounterFlame_Unity_Source.zip UnityProject -r
          7z a -tzip CounterFlame_Unity_Source.zip OpenInUnity.bat
          7z a -tzip CounterFlame_Unity_Source.zip README.txt

      - name: Create Installer
        run: |
          7z a -sfx CounterFlame_Source_Installer.exe UnityProject OpenInUnity.bat README.txt -r

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CounterFlame_Source
          path: |
            CounterFlame_Unity_Source.zip
            CounterFlame_Source_Installer.exe
          compression-level: 0

      - name: Summary
        shell: pwsh
        run: |
          $count = (Get-ChildItem -Path UnityProject -Recurse -File).Count
          Write-Host "::notice::Extraction complete! Files extracted: $count"
