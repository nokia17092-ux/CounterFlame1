name: Unity APK to Full Source Code with PC Controls
on:
  workflow_dispatch:

jobs:
  extract-unity-source:
    runs-on: windows-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install 7zip and mega.py
        shell: pwsh
        run: |
          choco install 7zip -y
          python -m pip install mega.py==1.0.8
          python -m pip install tenacity==9.1.4 --force-reinstall

      - name: Patch mega.py for Windows
        shell: bash
        run: |
          python -c "
          from pathlib import Path
          p = Path(__import__('mega').__file__).parent / 'mega.py'
          text = p.read_text()
          old = '            shutil.move(temp_output_file.name, output_path)'
          new = '            temp_output_file.close()\n            shutil.move(temp_output_file.name, output_path)'
          if old in text:
              p.write_text(text.replace(old, new, 1))
              print('Patched successfully')
          else:
              print('Patch not needed or already applied')
          "

      - name: Download APK from MEGA
        shell: pwsh
        run: |
          $url = "https://mega.nz/file/Dc0QSJZI#TfyhLwJurazL9wuMTtbzuKRubt60QwFzKoATerErB0M"
          python -c "from mega import Mega; import sys; Mega().download_url(sys.argv[1])" $url
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MEGA download failed. Check link validity and network access."
            exit 1
          }
          $apkFile = Get-ChildItem -Path . -Filter *.apk | Select-Object -First 1
          if (-not $apkFile) {
            Write-Error "APK file was not created after MEGA download."
            exit 1
          }
          if ($apkFile.Name -ne "cf1.1.3.apk") {
            Rename-Item $apkFile.FullName "cf1.1.3.apk" -Force
          }
          $size = [math]::Round((Get-Item "cf1.1.3.apk").Length / 1MB, 2)
          Write-Host "Downloaded: $size MB"

      - name: Verify APK
        shell: pwsh
        run: |
          if (-not (Test-Path "cf1.1.3.apk")) {
            Write-Error "APK file does not exist. Download step failed."
            exit 1
          }
          $bytes = Get-Content "cf1.1.3.apk" -AsByteStream -TotalCount 4
          $header = [System.Text.Encoding]::ASCII.GetString($bytes)
          Write-Host "File header: $header"
          
          $size = (Get-Item "cf1.1.3.apk").Length
          if ($size -lt 1000000) {
            Write-Host "ERROR: File too small ($size bytes)"
            exit 1
          }

      - name: Extract APK
        shell: pwsh
        run: |
          7z x cf1.1.3.apk -oAPK_Full -y
          if (Test-Path "APK_Full") {
            Write-Host "APK extracted successfully"
          } else {
            Write-Host "Extraction failed"
            exit 1
          }

      - name: Create Unity Project
        shell: cmd
        run: |
          mkdir UnityProject\Assets
          if exist APK_Full (
            xcopy APK_Full UnityProject\Assets /E /I /H /Y
          )

      - name: Create Unity Settings
        shell: cmd
        run: |
          mkdir UnityProject\ProjectSettings
          mkdir UnityProject\Packages
          echo m_EditorVersion: 2021.3.0f1 > UnityProject\ProjectSettings\ProjectVersion.txt
          echo {"name":"com.counterflame.pc","version":"1.1.3","unity":"2021.3"} > UnityProject\Packages\manifest.json

      - name: Build Unity Project to EXE
        shell: cmd
        run: |
          REM Note: This step requires Unity Editor to be installed and licensed
          REM If Unity is not installed, skip this step or install Unity manually
          if exist "C:\Program Files\Unity\Hub\Editor\2021.3.0f1\Editor\Unity.exe" (
            "C:\Program Files\Unity\Hub\Editor\2021.3.0f1\Editor\Unity.exe" -batchmode -nographics -projectPath %CD%\UnityProject -buildWindows64Player %CD%\CounterFlame.exe -quit
            if exist CounterFlame.exe (
              echo Build successful
            ) else (
              echo Build failed or Unity not properly configured
            )
          ) else (
            echo Unity Editor not found. Please install Unity 2021.3.0f1 and run the build manually.
          )

      - name: Create Scripts Folder
        shell: cmd
        run: |
          mkdir UnityProject\Assets\Scripts
          mkdir UnityProject\Assets\Scripts\PCControls

      - name: Create PCInputManager
        shell: cmd
        run: |
          echo using UnityEngine; > UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo public class PCInputManager : MonoBehaviour >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo { >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     public static PCInputManager Instance; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     public Vector2 movementInput; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     public Vector2 lookInput; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     public bool shootPressed; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     public bool jumpPressed; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     public bool crouchPressed; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     public bool reloadPressed; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     public bool interactPressed; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     void Awake() >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         if (Instance == null) Instance = this; >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         else Destroy(gameObject); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         DontDestroyOnLoad(gameObject); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     void Update() >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         movementInput = new Vector2(Input.GetAxis("Horizontal"), Input.GetAxis("Vertical")); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         lookInput = new Vector2(Input.GetAxis("Mouse X"), Input.GetAxis("Mouse Y")); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         shootPressed = Input.GetMouseButtonDown(0); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         jumpPressed = Input.GetKeyDown(KeyCode.Space); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         crouchPressed = Input.GetKey(KeyCode.LeftShift); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         reloadPressed = Input.GetKeyDown(KeyCode.R); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo         interactPressed = Input.GetKeyDown(KeyCode.E); >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs
          echo } >> UnityProject\Assets\Scripts\PCControls\PCInputManager.cs

      - name: Create MouseLook
        shell: cmd
        run: |
          echo using UnityEngine; > UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo public class MouseLook : MonoBehaviour >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo { >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     public float mouseSensitivity = 100f; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     public Transform playerBody; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     private float xRotation = 0f; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     void Start() >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         if (playerBody == null) playerBody = transform.parent; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         if (playerBody == null) playerBody = transform; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         Cursor.lockState = CursorLockMode.Locked; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     void Update() >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         float mouseX = Input.GetAxis("Mouse X") * mouseSensitivity * Time.deltaTime; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         float mouseY = Input.GetAxis("Mouse Y") * mouseSensitivity * Time.deltaTime; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         xRotation -= mouseY; >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         xRotation = Mathf.Clamp(xRotation, -90f, 90f); >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         transform.localRotation = Quaternion.Euler(xRotation, 0f, 0f); >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo         playerBody.Rotate(Vector3.up * mouseX); >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs
          echo } >> UnityProject\Assets\Scripts\PCControls\MouseLook.cs

      - name: Create PlayerMovement
        shell: cmd
        run: |
          echo using UnityEngine; > UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo public class PlayerMovement : MonoBehaviour >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo { >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     public float walkSpeed = 5f; >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     public float crouchSpeed = 2.5f; >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     private Rigidbody rb; >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     private float originalHeight; >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     void Start() >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         rb = GetComponent<Rigidbody>(); >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         if (rb == null) rb = gameObject.AddComponent<Rigidbody>(); >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         originalHeight = transform.localScale.y; >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     void Update() >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     { >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         float x = Input.GetAxis("Horizontal"); >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         float z = Input.GetAxis("Vertical"); >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         Vector3 move = transform.right * x + transform.forward * z; >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         bool isCrouching = Input.GetKey(KeyCode.LeftShift); >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         float currentSpeed = isCrouching ? crouchSpeed : walkSpeed; >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         rb.velocity = new Vector3(move.x * currentSpeed, rb.velocity.y, move.z * currentSpeed); >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         if (isCrouching) >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         { >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo             transform.localScale = new Vector3(transform.localScale.x, 0.5f, transform.localScale.z); >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         } >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         else >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         { >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo             transform.localScale = new Vector3(transform.localScale.x, originalHeight, transform.localScale.z); >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo         } >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo     } >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs
          echo } >> UnityProject\Assets\Scripts\PCControls\PlayerMovement.cs

      - name: Create Controls Help
        shell: cmd
        run: |
          echo PC CONTROLS: > UnityProject\Assets\Controls.txt
          echo - WASD: Move >> UnityProject\Assets\Controls.txt
          echo - Mouse: Look >> UnityProject\Assets\Controls.txt
          echo - Left Click: Shoot >> UnityProject\Assets\Controls.txt
          echo - Space: Jump >> UnityProject\Assets\Controls.txt
          echo - Left Shift: Crouch >> UnityProject\Assets\Controls.txt
          echo - R: Reload >> UnityProject\Assets\Controls.txt
          echo - E: Interact >> UnityProject\Assets\Controls.txt

      - name: Create Batch File
        shell: cmd
        run: |
          echo @echo off > OpenInUnity.bat
          echo echo CounterFlame PC Port >> OpenInUnity.bat
          echo echo Controls: WASD, Mouse, Space, Left Shift >> OpenInUnity.bat
          echo if exist CounterFlame.exe ( >> OpenInUnity.bat
          echo   echo Running CounterFlame.exe >> OpenInUnity.bat
          echo   CounterFlame.exe >> OpenInUnity.bat
          echo ) else ( >> OpenInUnity.bat
          echo   echo CounterFlame.exe not found. Open UnityProject folder in Unity Hub to build. >> OpenInUnity.bat
          echo   pause >> OpenInUnity.bat
          echo ) >> OpenInUnity.bat

      - name: Create Readme
        shell: cmd
        run: |
          echo CounterFlame PC Port > UnityProject\README.txt
          echo ================= >> UnityProject\README.txt
          echo Controls: >> UnityProject\README.txt
          echo WASD - Move >> UnityProject\README.txt
          echo Mouse - Look >> UnityProject\README.txt
          echo Left Shift - Crouch >> UnityProject\README.txt
          echo Space - Jump >> UnityProject\README.txt
          echo. >> UnityProject\README.txt
          echo If CounterFlame.exe is included, you can run it directly. >> UnityProject\README.txt
          echo Otherwise, open UnityProject in Unity Editor and build for Windows. >> UnityProject\README.txt

      - name: Create ZIP
        shell: cmd
        run: |
          7z a -tzip CounterFlame_PC_Port.zip UnityProject -r
          7z a -tzip CounterFlame_PC_Port.zip OpenInUnity.bat
          if exist CounterFlame.exe (
            7z a -tzip CounterFlame_PC_Port.zip CounterFlame.exe
          )

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CounterFlame_PC_Port
          path: CounterFlame_PC_Port.zip

      - name: Complete
        shell: cmd
        run: |
          echo ========================================
          echo CounterFlame PC Port Complete!
          echo ========================================
          if exist CounterFlame.exe (
            echo EXE file created successfully.
          ) else (
            echo EXE not built. Open project in Unity to compile.
          )
