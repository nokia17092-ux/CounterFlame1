name: Unity APK to Full Source Code
on:
  workflow_dispatch:

jobs:
  extract-unity-source:
    runs-on: windows-latest
    steps:
      - name: Download APK
        shell: pwsh
        run: |
          $url = "https://drive.usercontent.google.com/download?id=1BkFudhadd-Oz2nuJe8IOq6fSwSxSrTrM&confirm=t"
          Invoke-WebRequest -Uri $url -OutFile "game.apk"
          Write-Host "Downloaded: game.apk"

      - name: Install Tools
        run: |
          choco install 7zip -y
          choco install python -y
          python -m pip install UnityPy

      - name: Extract APK
        run: |
          7z x game.apk -oAPK_Full -y
          echo "APK extracted"

      - name: Copy All Files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path UnityProject/Assets
          Copy-Item -Path APK_Full/* -Destination UnityProject/Assets/ -Recurse -Force

      - name: Create Python Script
        shell: pwsh
        run: |
          $code = @'
import UnityPy
import os
from pathlib import Path
out = "ExtractedAssets"
os.makedirs(out, exist_ok=True)
files = list(Path("APK_Full").rglob("*.assets")) + list(Path("APK_Full").rglob("*.sharedAssets"))
for f in files:
    try:
        env = UnityPy.load(f)
        for obj in env.objects:
            data = obj.read()
            if data.type.name == "Texture2D":
                img = data.image
                if img:
                    img.save(f"{out}/tex_{obj.path_id}.png")
            elif data.type.name == "Mesh":
                with open(f"{out}/mesh_{obj.path_id}.obj", "w") as fp:
                    fp.write(data.export())
    except:
        pass
'@
          Set-Content -Path "extract.py" -Value $code -Encoding ASCII

      - name: Run Python Script
        run: |
          python extract.py

      - name: Copy Extracted Assets
        shell: pwsh
        run: |
          if (Test-Path "ExtractedAssets") {
            Copy-Item -Path ExtractedAssets/* -Destination UnityProject/Assets/ -Recurse -Force
          }

      - name: Find Scripts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path UnityProject/Assets/Scripts
          $dlls = Get-ChildItem -Path APK_Full -Recurse -Filter "*.dll" | Where-Object { $_.Name -like "Assembly-CSharp*" }
          if ($dlls) {
            Copy-Item -Path $dlls.FullName -Destination UnityProject/Assets/Scripts/ -Force
          }
          $so = Get-ChildItem -Path APK_Full -Recurse -Filter "*.so"
          if ($so) {
            New-Item -ItemType Directory -Force -Path UnityProject/Assets/Plugins
            Copy-Item -Path $so.FullName -Destination UnityProject/Assets/Plugins/ -Force
          }

      - name: Create Unity Settings
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path UnityProject/ProjectSettings
          New-Item -ItemType Directory -Force -Path UnityProject/Packages
          $manifest = "{`n  `"name`": `"com.counterflame.extracted`",`n  `"version`": `"1.1.3`",`n  `"unity`": `"2021.3`"`n}"
          $manifest | Out-File -FilePath UnityProject/Packages/manifest.json -Encoding UTF8
          "m_EditorVersion: 2021.3.0f1" | Out-File -FilePath UnityProject/ProjectSettings/ProjectVersion.txt -Encoding UTF8

      - name: Create Batch File
        shell: pwsh
        run: |
          $bat = @'
@echo off
echo CounterFlame Unity Project
echo Open UnityProject folder in Unity Hub
pause
'@
          $bat | Out-File -FilePath "OpenInUnity.bat" -Encoding ASCII

      - name: Create Info File
        shell: pwsh
        run: |
          $info = @'
CounterFlame Extracted Project
Install Unity 2021.3
Open UnityProject folder in Unity Hub
'@
          $info | Out-File -FilePath "UnityProject/INFO.txt" -Encoding UTF8

      - name: Create Archive
        run: |
          7z a -tzip CounterFlame_Unity_Source.zip UnityProject -r
          7z a -tzip CounterFlame_Unity_Source.zip OpenInUnity.bat

      - name: Create EXE Installer
        run: |
          7z a -sfx CounterFlame_Source_Installer.exe UnityProject OpenInUnity.bat -r

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CounterFlame_Source
          path: |
            CounterFlame_Unity_Source.zip
            CounterFlame_Source_Installer.exe
          compression-level: 0

      - name: Done
        shell: pwsh
        run: |
          $count = (Get-ChildItem -Path UnityProject -Recurse -File).Count
          Write-Host "Done! Files: $count"
